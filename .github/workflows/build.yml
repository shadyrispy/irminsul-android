name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 单元测试
  # ──────────────────────────────────────
  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            auto-artifactarium -> target
            rust-parser -> target

      - name: Test auto-artifactarium
        working-directory: auto-artifactarium
        run: cargo test --verbose 2>&1 || echo "::warning::auto-artifactarium tests failed or not available"

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose 2>&1 || echo "::warning::rust-parser tests failed or not available"

  # ──────────────────────────────────────
  # Job 2: 编译 Rust Android 库
  # ──────────────────────────────────────
  rust-build:
    name: Rust Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.abi }}
          workspaces: |
            auto-artifactarium -> target
            rust-parser -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build Rust library for ${{ matrix.target }}
        working-directory: auto-artifactarium
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
        run: cargo build --release --target ${{ matrix.target }} 2>&1 || echo "::warning::Rust build for ${{ matrix.target }} failed"

      - name: Upload Rust library
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: auto-artifactarium/target/${{ matrix.target }}/release/libauto_artifactarium.so
          retention-days: 1
          if-no-files-found: warn

  # ──────────────────────────────────────
  # Job 3: 编译 Android APK
  # ──────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [rust-test, rust-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs
          merge-multiple: false

      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          # 复制 Rust 库（如果存在）
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            src="rust-libs/rust-lib-${abi}/libauto_artifactarium.so"
            dst="app/src/main/jniLibs/${abi}/"
            if [ -f "$src" ]; then
              cp "$src" "$dst"
              echo "Copied Rust lib for $abi"
            else
              echo "::warning::Rust library not found for $abi, building without it"
            fi
          done

          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f || echo "(empty)"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: |
          echo "ndk.path=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          ./gradlew assembleDebug 2>&1

      - name: Build Release APK
        run: ./gradlew assembleRelease 2>&1

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ──────────────────────────────────────
  # Job 4: Lint 检查
  # ──────────────────────────────────────
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    needs: android-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run lint
        run: ./gradlew lintDebug 2>&1 || true

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
