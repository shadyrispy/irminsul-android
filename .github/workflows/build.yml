name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────
  # Job 1: 生成游戏数据库（有缓存）
  # ────────────────────────────────────
  prepare-data:
    name: Prepare Game Data
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.get-commit.outputs.commit }}
      cache-key: ${{ steps.cache-db.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Get target commit
        id: get-commit
        run: |
          COMMIT="${{ vars.GENSHIN_DATA_COMMIT }}"
          if [ -z "$COMMIT" ]; then
            COMMIT=$(git ls-tree HEAD anime-game-data | awk '{print $3}')
          fi
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Target commit: ${COMMIT:0:8}"

      # 缓存 database.json：key = commit hash
      - name: Restore database.json cache
        id: cache-db
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/game_data/database.json
          key: db-${{ steps.get-commit.outputs.commit }}

      # 缓存未命中才重新生成
      - name: Set up Python
        if: steps.cache-db.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download & build database
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          python3 scripts/build_database.py ${{ steps.get-commit.outputs.commit }} \
            app/src/main/assets/game_data/database.json
          echo "${{ steps.get-commit.outputs.commit }}" > app/src/main/assets/game_data/VERSION

      - name: Verify database.json
        run: |
          ls -lh app/src/main/assets/game_data/database.json
          cat app/src/main/assets/game_data/VERSION

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-database
          path: app/src/main/assets/game_data/database.json
          retention-days: 7

  # ────────────────────────────────────
  # Job 2: Rust 测试（有缓存）
  # ────────────────────────────────────
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 缓存 Rust target/：key = Cargo.lock 的 hash
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose

  # ────────────────────────────────────
  # Job 3: 编译 Rust ARM 库（有缓存）
  # ────────────────────────────────────
  rust-build:
    name: Rust Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: [rust-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build rust-parser for ${{ matrix.target }}
        working-directory: rust-parser
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CC_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols
        run: |
          STRIP=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so || true

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so
          retention-days: 1

  # ────────────────────────────────────
  # Job 4: 构建 APK（有缓存）
  # ────────────────────────────────────
  android-build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    needs: [prepare-data, rust-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download game database
        uses: actions/download-artifact@v4
        with:
          name: game-database
          path: app/src/main/assets/game_data/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 缓存 Gradle build/：key = build.gradle 的 hash
      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            app/build
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-build-${{ hashFiles('**/*.gradle', '**/*.gradle.kts') }}
          restore-keys: |
            gradle-build-

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs

      - name: Prepare jniLibs (ARM only)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust-libs/rust-lib-arm64-v8a/libirminsul_android_parser.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libirminsul_android_parser.so app/src/main/jniLibs/armeabi-v7a/
          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Build Debug APK
        run: |
          echo "ndk.path=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK size
        run: |
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          SIZE_BYTES=$(stat -c%s "$RELEASE_APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Release APK: ${SIZE_MB} MB"
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release APK**: ${SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "❌ APK too large (limit: 50 MB)"
            exit 1
          fi
          echo "✅ APK size OK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
