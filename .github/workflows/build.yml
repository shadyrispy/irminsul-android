name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 测试
  # ──────────────────────────────────────
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose

  # ──────────────────────────────────────
  # Job 2: 检查游戏 JSON 数据是否完整
  # ──────────────────────────────────────
  check-game-data:
    name: Check Game Data
    runs-on: ubuntu-latest
    outputs:
      data-version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check game data files
        id: get-version
        run: |
          echo "=== Checking game data in repo ==="
          VERSION_FILE="app/src/main/assets/game_data/VERSION"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "ERROR: VERSION file not found in repo"
            echo "Run ./sync-game-data.sh locally and commit the result"
            exit 1
          fi

          VERSION=$(cat "$VERSION_FILE")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Game data version: ${VERSION:0:8}"

          # 检查所有 JSON 文件是否存在
          MISSING=0
          for f in AvatarExcelConfigData.json WeaponExcelConfigData.json \
                     MaterialExcelConfigData.json ReliquaryExcelConfigData.json \
                     ReliquaryMainPropExcelConfigData.json \
                     AvatarSkillDepotExcelConfigData.json DisplayItemExcelConfigData.json; do
            if [ ! -f "app/src/main/assets/game_data/$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING+1))
            fi
          done
          if [ ! -f "app/src/main/assets/game_data/TextMap/TextMapCHS.json" ]; then
            echo "MISSING: TextMap/TextMapCHS.json"
            MISSING=$((MISSING+1))
          fi

          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: $MISSING JSON file(s) missing from assets/game_data/"
            echo "Run: ./sync-game-data.sh <commit-hash> locally, then git add + commit"
            exit 1
          fi
          echo "✅ All game data files present"
          ls -lh app/src/main/assets/game_data/

  # ──────────────────────────────────────
  # Job 3: 编译 Rust ARM 库
  # ──────────────────────────────────────
  rust-build:
    name: Rust Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: [rust-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build rust-parser for ${{ matrix.target }}
        working-directory: rust-parser
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CC_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols
        run: |
          STRIP=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so || true

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so
          retention-days: 1

  # ──────────────────────────────────────
  # Job 4: 构建 APK + 验证
  # ──────────────────────────────────────
  android-build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    needs: [check-game-data, rust-build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs

      - name: Prepare jniLibs (ARM only)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust-libs/rust-lib-arm64-v8a/libirminsul_android_parser.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libirminsul_android_parser.so app/src/main/jniLibs/armeabi-v7a/
          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Build Debug APK
        run: |
          echo "ndk.path=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK contents
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"

          echo "=== APK files ==="
          ls -lh app/build/outputs/apk/release/ app/build/outputs/apk/debug/

          echo ""
          echo "=== Release APK package info ==="
          $BUILD_TOOLS/aapt dump badging "$RELEASE_APK" 2>&1 | head -5

          echo ""
          echo "=== Release APK permissions ==="
          $BUILD_TOOLS/aapt dump permissions "$RELEASE_APK" 2>&1

          echo ""
          echo "=== Checking required files in APK ==="
          $BUILD_TOOLS/aapt list "$RELEASE_APK" > /tmp/apk_contents.txt
          for file in AndroidManifest.xml classes.dex resources.arsc; do
            if grep -q "$file" /tmp/apk_contents.txt; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing: $file"
              exit 1
            fi
          done

          echo ""
          echo "=== Checking game data in APK ==="
          if grep -q "TextMapCHS.json" /tmp/apk_contents.txt; then
            echo "✅ Game data found in APK"
            grep "ExcelConfigData" /tmp/apk_contents.txt
          else
            echo "⚠️ WARNING: Game data not found in APK (will be downloaded at first launch)"
          fi

          echo ""
          echo "=== APK size check ==="
          SIZE_BYTES=$(stat -c%s "$RELEASE_APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Release APK: ${SIZE_MB} MB"
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "❌ APK too large (limit: 50 MB)"
            exit 1
          fi
          echo "✅ APK size OK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$RELEASE_APK" ]; then
            SIZE=$(ls -lh "$RELEASE_APK" | awk '{print $5}')
            echo "✅ **Release APK**: $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            $BUILD_TOOLS/aapt dump badging "$RELEASE_APK" 2>&1 | head -3 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release APK: failed" >> $GITHUB_STEP_SUMMARY
          fi
