name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 单元测试
  # ──────────────────────────────────────
  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Check formatting
        working-directory: rust-parser
        run: cargo fmt --all -- --check || true

      - name: Run clippy
        working-directory: rust-parser
        run: cargo clippy --all-targets -- -D warnings || true

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose

  # ──────────────────────────────────────
  # Job 2: 编译 Rust Android 库
  # ──────────────────────────────────────
  rust-build:
    name: Build Rust (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            api: 21
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            api: 21
          - target: x86_64-linux-android
            abi: x86_64
            api: 21
          - target: i686-linux-android
            abi: x86
            api: 21
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build rust-parser for ${{ matrix.target }}
        working-directory: rust-parser
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ matrix.api }}-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi${{ matrix.api }}-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android${{ matrix.api }}-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ matrix.api }}-clang
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ matrix.api }}-clang
          CC_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi${{ matrix.api }}-clang
          CC_i686_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android${{ matrix.api }}-clang
          CC_x86_64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ matrix.api }}-clang
          CXX_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android${{ matrix.api }}-clang++
          CXX_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi${{ matrix.api }}-clang++
          CXX_i686_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android${{ matrix.api }}-clang++
          CXX_x86_64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android${{ matrix.api }}-clang++
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_i686_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_x86_64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols
        run: |
          STRIP=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so || true

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so
          retention-days: 1

  # ──────────────────────────────────────
  # Job 3: 编译 Android APK
  # ──────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs

      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          cp rust-libs/rust-lib-arm64-v8a/libirminsul_android_parser.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libirminsul_android_parser.so app/src/main/jniLibs/armeabi-v7a/
          cp rust-libs/rust-lib-x86_64/libirminsul_android_parser.so app/src/main/jniLibs/x86_64/
          cp rust-libs/rust-lib-x86/libirminsul_android_parser.so app/src/main/jniLibs/x86/

          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Create gradlew if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "Creating minimal gradle wrapper..."
            mkdir -p gradle/wrapper
            cat > gradle/wrapper/gradle-wrapper.properties << 'GWP'
            distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
            distributionBase=GRADLE_USER_HOME
            distributionPath=wrapper/dists
            zipStoreBase=GRADLE_USER_HOME
            zipStorePath=wrapper/dists
          GWP
            curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -o gradlew
            chmod +x gradlew
          fi

      - name: Build Debug APK
        run: |
          echo "ndk.path=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          ./gradlew assembleDebug 2>&1 || {
            echo "=== Gradle build failed, checking project structure ==="
            find . -name "*.gradle" -o -name "*.kts" | head -20
            exit 1
          }

      - name: Build Release APK
        run: ./gradlew assembleRelease 2>&1 || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls app/build/outputs/apk/debug/*.apk 1>/dev/null 2>&1; then
            echo "✅ Debug APK built successfully" >> $GITHUB_STEP_SUMMARY
            ls -lh app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "❌ Debug APK build failed" >> $GITHUB_STEP_SUMMARY
          fi
          if ls app/build/outputs/apk/release/*.apk 1>/dev/null 2>&1; then
            echo "✅ Release APK built successfully" >> $GITHUB_STEP_SUMMARY
            ls -lh app/build/outputs/apk/release/*.apk >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "⚠️ Release APK build skipped or failed" >> $GITHUB_STEP_SUMMARY
          fi
