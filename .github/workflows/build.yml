name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 测试
  # ──────────────────────────────────────
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose

  # ──────────────────────────────────────
  # Job 2: 下载游戏 JSON 数据（来自 Dimbreath/GenshinData）
  # ──────────────────────────────────────
  sync-game-data:
    name: Sync Game Data
    runs-on: ubuntu-latest
    outputs:
      genshin-data-commit: ${{ steps.get-commit.outputs.commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest GenshinData commit
        id: get-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT=$(curl -s "https://api.github.com/repos/Dimbreath/GenshinData/commits?per_page=1" \
            -H "Authorization: token $GITHUB_TOKEN" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha']) if isinstance(d,list) else ''" 2>/dev/null || echo "FETCH_FAILED")
          if [ "$COMMIT" = "FETCH_FAILED" ] || [ -z "$COMMIT" ]; then
            echo "ERROR: Failed to fetch GenshinData commit"
            exit 1
          fi
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Latest GenshinData commit: ${COMMIT:0:8}"

      - name: Download game data JSON files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT: ${{ steps.get-commit.outputs.commit }}
        run: |
          set -e
          BASE="https://raw.githubusercontent.com/Dimbreath/GenshinData/$COMMIT/ExcelBinOutput"
          ASSETS_DIR="app/src/main/assets/game_data"
          mkdir -p "$ASSETS_DIR"
          mkdir -p "$ASSETS_DIR/TextMap"

          FILES=(
            "AvatarExcelConfigData.json"
            "WeaponExcelConfigData.json"
            "MaterialExcelConfigData.json"
            "ReliquaryExcelConfigData.json"
            "ReliquaryMainPropExcelConfigData.json"
            "ReliquaryAffixExcelConfigData.json"
            "AvatarSkillDepotExcelConfigData.json"
            "DisplayItemExcelConfigData.json"
          )

          for f in "${FILES[@]}"; do
            echo "Downloading $f..."
            curl -L --fail --max-time 60 -o "$ASSETS_DIR/$f" "$BASE/$f" \
              -H "Authorization: token $GITHUB_TOKEN"
            ls -lh "$ASSETS_DIR/$f"
          done

          echo "Downloading TextMapCHS.json..."
          curl -L --fail --max-time 60 -o "$ASSETS_DIR/TextMap/TextMapCHS.json" "$BASE/TextMap/TextMapCHS.json" \
            -H "Authorization: token $GITHUB_TOKEN"
          ls -lh "$ASSETS_DIR/TextMap/TextMapCHS.json"

          echo "$COMMIT" > "$ASSETS_DIR/VERSION"
          echo "Game data synced to GenshinData commit: ${COMMIT:0:8}"

      - name: Upload game data artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-data
          path: app/src/main/assets/game_data/
          retention-days: 1

  # ──────────────────────────────────────
  # Job 3: 编译 Rust ARM 库
  # ──────────────────────────────────────
  rust-build:
    name: Rust Build (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: [rust-test, sync-game-data]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build rust-parser for ${{ matrix.target }}
        working-directory: rust-parser
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CC_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip debug symbols
        run: |
          STRIP=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so || true

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so
          retention-days: 1

  # ──────────────────────────────────────
  # Job 4: 构建 APK + 验证
  # ──────────────────────────────────────
  android-build:
    name: Build & Verify APK
    runs-on: ubuntu-latest
    needs: [rust-build, sync-game-data]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: app/src/main/assets/game_data

      - name: Verify game data
        run: |
          echo "=== Game data contents ==="
          find app/src/main/assets/game_data -name "*.json" -exec ls -lh {} \;
          if [ ! -f "app/src/main/assets/game_data/VERSION" ]; then
            echo "WARNING: VERSION file not found"
          else
            echo "VERSION: $(cat app/src/main/assets/game_data/VERSION | cut -c1-8)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs

      - name: Prepare jniLibs (ARM only)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          cp rust-libs/rust-lib-arm64-v8a/libirminsul_android_parser.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libirminsul_android_parser.so app/src/main/jniLibs/armeabi-v7a/
          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Build Debug APK
        run: |
          echo "ndk.path=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Verify APK contents
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          DEBUG_APK="app/build/outputs/apk/debug/app-debug.apk"

          echo "=== APK files ==="
          ls -lh app/build/outputs/apk/release/ app/build/outputs/apk/debug/

          echo ""
          echo "=== Release APK package info ==="
          $BUILD_TOOLS/aapt dump badging "$RELEASE_APK" 2>&1 | head -5

          echo ""
          echo "=== Checking required files in APK ==="
          $BUILD_TOOLS/aapt list "$RELEASE_APK" > /tmp/apk_contents.txt
          for file in AndroidManifest.xml classes.dex resources.arsc; do
            if grep -q "$file" /tmp/apk_contents.txt; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing: $file"
              exit 1
            fi
          done

          echo ""
          echo "=== APK size check ==="
          SIZE_BYTES=$(stat -c%s "$RELEASE_APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Release APK: ${SIZE_MB} MB"
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "❌ APK too large (limit: 50 MB)"
            exit 1
          fi
          echo "✅ APK size OK"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            SIZE=$(ls -lh "$RELEASE_APK" | awk '{print $5}')
            echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Release APK**: $SIZE" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            $BUILD_TOOLS/aapt dump badging "$RELEASE_APK" 2>&1 | head -3 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Release APK: failed" >> $GITHUB_STEP_SUMMARY
          fi
