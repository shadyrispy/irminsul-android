# GitHub Actions 工作流 - Irminsul
# 原神游戏数据解析 Android 应用
# 每个 job 都配置了缓存，Rust 代码无改动时跳过编译

name: Build and Release

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: Rust 库编译 (仅 ARM 架构)
  build-rust:
    name: Build Rust (${{ matrix.target }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 检查 Rust 源码是否有改动
        id: check-rust-changes
        run: |
          RUST_HASH="${{ hashFiles('rustlib/Cargo.toml', 'rustlib/src/**/*.rs') }}"
          echo "rust_hash=$RUST_HASH" >> $GITHUB_OUTPUT
          echo "Rust hash: $RUST_HASH"

      - name: 尝试恢复已编译的 so 文件
        id: restore-so
        uses: actions/cache@v4
        with:
          path: |
            rustlib/target/${{ matrix.target }}/release/libirminsul_parser.so
          key: rust-so-${{ matrix.target }}-${{ steps.check-rust-changes.outputs.rust_hash }}

      - name: 安装 Rust 工具链
        if: steps.restore-so.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装 cargo-ndk
        if: steps.restore-so.outputs.cache-hit != 'true'
        run: cargo install cargo-ndk

      - name: 缓存 Cargo 依赖
        if: steps.restore-so.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rustlib/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ steps.check-rust-changes.outputs.rust_hash }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: 安装 Android NDK
        if: steps.restore-so.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: 编译 Rust 库
        if: steps.restore-so.outputs.cache-hit != 'true'
        working-directory: rustlib
        run: cargo ndk -t ${{ matrix.target }} build --release

      - name: 验证 so 文件存在
        run: |
          ls -la rustlib/target/${{ matrix.target }}/release/libirminsul_parser.so || exit 1

      - name: 上传 Rust 库
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.target }}
          path: rustlib/target/${{ matrix.target }}/release/libirminsul_parser.so
          retention-days: 30

  # Job 2: 合并 Rust 库到 jniLibs
  merge-rust-libs:
    name: Merge Rust Libraries
    runs-on: ubuntu-latest
    needs: build-rust
    outputs:
      jniLibs-hash: ${{ steps.hash.outputs.hash }}

    steps:
      - name: 下载所有 Rust 库
        uses: actions/download-artifact@v4
        with:
          pattern: rust-lib-*
          path: rust-libs
          merge-multiple: false

      - name: 组织 jniLibs 目录
        run: |
          mkdir -p jniLibs/arm64-v8a
          mkdir -p jniLibs/armeabi-v7a
          cp rust-libs/rust-lib-aarch64-linux-android/libirminsul_parser.so jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armv7-linux-androideabi/libirminsul_parser.so jniLibs/armeabi-v7a/
          chmod +x jniLibs/*/*.so
          echo "jniLibs contents:"
          find jniLibs -type f -exec ls -la {} \;

      - name: 计算 jniLibs hash
        id: hash
        run: |
          HASH=$(find jniLibs -type f -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "jniLibs hash: $HASH"

      - name: 打包 jniLibs
        run: tar -czvf jniLibs.tar.gz jniLibs

      - name: 上传 jniLibs
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs
          path: jniLibs.tar.gz
          retention-days: 30

  # Job 3: 构建 Debug APK
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: merge-rust-libs

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 下载 jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: .

      - name: 解压 jniLibs
        run: |
          tar -xzvf jniLibs.tar.gz
          mkdir -p app/src/main/jniLibs
          cp -r jniLibs/* app/src/main/jniLibs/
          chmod +x app/src/main/jniLibs/*/*.so

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 安装 Android NDK
        uses: android-actions/setup-android@v3

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 授予执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # Job 4: 构建 Release APK (仅 main 分支或 tag)
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: merge-rust-libs
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 下载 jniLibs
        uses: actions/download-artifact@v4
        with:
          name: jniLibs
          path: .

      - name: 解压 jniLibs
        run: |
          tar -xzvf jniLibs.tar.gz
          mkdir -p app/src/main/jniLibs
          cp -r jniLibs/* app/src/main/jniLibs/
          chmod +x app/src/main/jniLibs/*/*.so

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: 安装 Android NDK
        uses: android-actions/setup-android@v3

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 授予执行权限
        run: chmod +x gradlew

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  # Job 5: 创建 Release (仅 tag)
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 下载 Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: ./apk

      - name: 获取版本号
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Irminsul Android v${{ steps.get_version.outputs.VERSION }}

            ### 功能
            - 原神游戏数据解析
            - 支持 ARM64 和 ARM32 架构
            - 基于 Rust 的高性能解析器

            ### 安装
            下载 APK 文件并安装到 Android 设备。

            ### 变更内容
            查看提交历史了解详细变更。
          files: apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
