name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────
  # Job 1: Rust 单元测试 + Clippy 检查
  # ──────────────────────────────────────
  rust-test:
    name: Rust Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Test rust-parser
        working-directory: rust-parser
        run: cargo test --verbose 2>&1

      - name: Clippy check rust-parser
        working-directory: rust-parser
        run: cargo clippy -- -D warnings 2>&1 || true

      - name: Check rust-parser compiles
        working-directory: rust-parser
        run: cargo check --verbose 2>&1

  # ──────────────────────────────────────
  # Job 2: 编译 Rust Android 库
  # ──────────────────────────────────────
  rust-build:
    name: Build Rust (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: [rust-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
          - target: i686-linux-android
            abi: x86
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust-parser -> target
            auto-artifactarium -> target

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build rust-parser for ${{ matrix.target }}
        working-directory: rust-parser
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CARGO_TARGET_I686_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
          CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          CC_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          CC_i686_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang
          CC_x86_64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_armv7_linux_androideabi: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_i686_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          AR_x86_64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify .so file exists
        run: |
          SO_FILE="rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so"
          if [ ! -f "$SO_FILE" ]; then
            echo "ERROR: Expected .so file not found: $SO_FILE"
            ls -la rust-parser/target/${{ matrix.target }}/release/ 2>/dev/null || echo "Release dir not found"
            exit 1
          fi
          echo "✅ .so file found: $(ls -lh $SO_FILE)"

      - name: Strip debug symbols
        run: |
          STRIP=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP --strip-unneeded rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so || true

      - name: Upload Rust library
        uses: actions/upload-artifact@v4
        with:
          name: rust-lib-${{ matrix.abi }}
          path: rust-parser/target/${{ matrix.target }}/release/libirminsul_android_parser.so
          retention-days: 1

  # ──────────────────────────────────────
  # Job 3: 编译 Android APK
  # ──────────────────────────────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [rust-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download Rust libraries
        uses: actions/download-artifact@v4
        with:
          path: rust-libs

      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

          cp rust-libs/rust-lib-arm64-v8a/libirminsul_android_parser.so app/src/main/jniLibs/arm64-v8a/
          cp rust-libs/rust-lib-armeabi-v7a/libirminsul_android_parser.so app/src/main/jniLibs/armeabi-v7a/
          cp rust-libs/rust-lib-x86_64/libirminsul_android_parser.so app/src/main/jniLibs/x86_64/
          cp rust-libs/rust-lib-x86/libirminsul_android_parser.so app/src/main/jniLibs/x86/

          echo "=== jniLibs contents ==="
          find app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Generate release keystore
        run: |
          which keytool || echo "keytool not found"
          java -version 2>&1 || true
          ls -la app/ | head -5
          keytool -genkeypair -v \
            -keystore app/release.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias release \
            -storepass irminsul123 \
            -keypass irminsul123 \
            -dname "CN=Irminsul,O=GitHub Actions,C=US" 2>&1

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          storeFile=app/release.keystore
          storePassword=irminsul123
          keyAlias=release
          keyPassword=irminsul123
          EOF

      - name: Build Debug APK
        run: |
          echo "ndk.path=$ANDROID_HOME/ndk/25.2.9519653" >> local.properties
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Release APK (signed)
        run: ./gradlew assembleRelease

  # ──────────────────────────────────────
  # Job 4: APK 验证测试
  # ──────────────────────────────────────
  apk-verify:
    name: Verify APK
    runs-on: ubuntu-latest
    needs: [android-build]
    steps:
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          pattern: "app-*"
          path: apk-outputs
          merge-multiple: true

      - name: Find APK files
        id: find-apks
        run: |
          echo "=== Downloaded files ==="
          find apk-outputs -type f -name "*.apk" | while read f; do
            echo "Found: $f ($(ls -lh "$f" | awk '{print $5}'))"
          done
          DEBUG_APK=$(find apk-outputs -name "app-debug.apk" | head -1)
          RELEASE_APK=$(find apk-outputs -name "app-release.apk" | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Verify APK signing
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          
          echo "=== Verifying Debug APK signing ==="
          if [ -n "${{ steps.find-apks.outputs.debug_apk }}" ]; then
            $BUILD_TOOLS/apksigner verify --verbose "${{ steps.find-apks.outputs.debug_apk }}" || exit 1
            echo "✅ Debug APK signature: OK"
          else
            echo "⚠️ Debug APK not found"
          fi
          
          echo ""
          echo "=== Verifying Release APK signing ==="
          if [ -n "${{ steps.find-apks.outputs.release_apk }}" ]; then
            $BUILD_TOOLS/apksigner verify --verbose "${{ steps.find-apks.outputs.release_apk }}" || exit 1
            echo "✅ Release APK signature: OK"
          else
            echo "❌ Release APK not found"
            exit 1
          fi

      - name: Verify APK package info
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          
          echo "=== Release APK package info ==="
          $BUILD_TOOLS/aapt dump badging "${{ steps.find-apks.outputs.release_apk }}" 2>&1 | head -5
          
          echo ""
          echo "=== Release APK permissions ==="
          $BUILD_TOOLS/aapt dump permissions "${{ steps.find-apks.outputs.release_apk }}" 2>&1
          
          echo ""
          echo "=== Release APK activities/services ==="
          $BUILD_TOOLS/aapt dump xmltree "${{ steps.find-apks.outputs.release_apk }}" AndroidManifest.xml 2>&1 | grep -E "activity|service|permission" | head -20

      - name: Verify APK structure
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          
          echo "=== Checking zipalign ==="
          $BUILD_TOOLS/zipalign -c -v 4 "${{ steps.find-apks.outputs.release_apk }}" 2>&1 | tail -3
          
          echo ""
          echo "=== Checking required files in APK ==="
          $BUILD_TOOLS/aapt list "${{ steps.find-apks.outputs.release_apk }}" > /tmp/apk_contents.txt
          
          REQUIRED_FILES=(
            "AndroidManifest.xml"
            "classes.dex"
            "resources.arsc"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if grep -q "$file" /tmp/apk_contents.txt; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing: $file"
              exit 1
            fi
          done
          
          echo ""
          echo "=== Checking native libraries in APK ==="
          grep "libirminsul_android_parser.so" /tmp/apk_contents.txt | while read line; do
            echo "✅ Found: $line"
          done
          
          SO_COUNT=$(grep -c "libirminsul_android_parser.so" /tmp/apk_contents.txt || true)
          if [ "$SO_COUNT" -eq 0 ]; then
            echo "⚠️ WARNING: No native .so libraries found in APK"
          else
            echo "✅ Found $SO_COUNT native library ABI(s)"
          fi

      - name: Verify APK size
        run: |
          RELEASE_APK="${{ steps.find-apks.outputs.release_apk }}"
          SIZE_BYTES=$(stat -c%s "$RELEASE_APK" 2>/dev/null || stat -f%z "$RELEASE_APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          
          echo "Release APK size: ${SIZE_MB} MB"
          
          # APK 不应超过 50MB
          if [ "$SIZE_BYTES" -gt 52428800 ]; then
            echo "❌ APK too large: ${SIZE_MB} MB (limit: 50 MB)"
            exit 1
          fi
          echo "✅ APK size OK: ${SIZE_MB} MB"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: verified-release-apk
          path: ${{ steps.find-apks.outputs.release_apk }}
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          RELEASE_APK="${{ steps.find-apks.outputs.release_apk }}"
          
          echo "## APK Verification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "$RELEASE_APK" ]; then
            SIZE=$(ls -lh "$RELEASE_APK" | awk '{print $5}')
            echo "✅ **Release APK**: $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            $BUILD_TOOLS/apksigner verify --print-certs "$RELEASE_APK" >> $GITHUB_STEP_SUMMARY 2>&1
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            $BUILD_TOOLS/aapt dump badging "$RELEASE_APK" | head -5 >> $GITHUB_STEP_SUMMARY 2>&1
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Release APK not found" >> $GITHUB_STEP_SUMMARY
          fi
